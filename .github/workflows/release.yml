name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег для сборки (например, v1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  # --- Standalone-исполняемые файлы под каждую ОС ---------------------------
  build-binaries:
    name: Сборка ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            asset: MetadataViewer-linux
          - os: windows-latest
            label: windows
            asset: MetadataViewer-windows.exe
          - os: macos-latest
            label: macos
            asset: MetadataViewer-macos
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow mutagen pypdf

      - name: Сборка исполняемого файла
        run: >
          pyinstaller --onefile --name MetadataViewer
          --collect-submodules metadataviewer
          metadata_viewer.py

      - name: Переименование артефакта (Unix)
        if: runner.os != 'Windows'
        run: mv dist/MetadataViewer "dist/${{ matrix.asset }}"

      - name: Переименование артефакта (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist/MetadataViewer.exe "dist/${{ matrix.asset }}"

      - name: Загрузка как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Публикация в релиз
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/${{ matrix.asset }}
          generate_release_notes: true

  # --- Debian-пакет (.deb) -------------------------------------------------
  build-deb:
    name: Сборка .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Сборка .deb
        run: bash packaging/build_deb.sh

      - name: Загрузка как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb

      - name: Публикация в релиз
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.deb
          generate_release_notes: true

  # --- Python-пакет (wheel + sdist) ----------------------------------------
  build-wheel:
    name: Сборка Python-пакета
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Сборка wheel и sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Загрузка как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

      - name: Публикация в релиз
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
